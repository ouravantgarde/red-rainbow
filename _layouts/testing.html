<html lang="en-US">
<head>

    <link rel="stylesheet" href="{{ '/assets/css/testing.css' | relative_url }}">
    <title>Red Rainbow</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.png">  

</head>
  
<body>

    <div id="testing">
            <div class="toc">

        {{ content | replace: 'abbr title=', 'abbr data-title=' }}
    
    </div>

</html>
